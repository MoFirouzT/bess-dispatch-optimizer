<svg viewBox="0 0 720 250" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="4" y="4" width="712" height="242" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="360" y="36" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2328">Three revenue levels, provably ordered</text>

  <!-- baseline (V=0) -->
  <line x1="150" y1="70" x2="150" y2="210" stroke="#57606a" stroke-width="1.5"/>
  <text x="150" y="230" text-anchor="middle" font-size="12" fill="#57606a">0</text>

  <!-- Greedy bar (floor) -->
  <rect x="150" y="78" width="190" height="32" rx="4" fill="#bc4c00" fill-opacity="0.18" stroke="#bc4c00"/>
  <text x="142" y="99" text-anchor="end" font-size="12.5" fill="#1f2328">V<tspan dy="-5" font-size="10">greedy</tspan></text>
  <text x="158" y="98" font-size="11" fill="#bc4c00">percentile rule</text>

  <!-- Rolling bar (deployable) -->
  <rect x="150" y="126" width="370" height="32" rx="4" fill="#0969da" fill-opacity="0.18" stroke="#0969da"/>
  <text x="142" y="147" text-anchor="end" font-size="12.5" fill="#1f2328">V<tspan dy="-5" font-size="10">roll</tspan></text>
  <text x="158" y="146" font-size="11" fill="#0969da">per-day MILP</text>

  <!-- Ceiling bar -->
  <rect x="150" y="174" width="470" height="32" rx="4" fill="#1a7f37" fill-opacity="0.18" stroke="#1a7f37"/>
  <text x="142" y="195" text-anchor="end" font-size="12.5" fill="#1f2328">V<tspan dy="-5" font-size="10">★</tspan></text>
  <text x="158" y="194" font-size="11" fill="#1a7f37">full-horizon MILP</text>

  <!-- cross-day gap bracket between roll end (520) and ceiling end (620) -->
  <line x1="520" y1="120" x2="520" y2="66" stroke="#8c959f" stroke-dasharray="4 3"/>
  <line x1="620" y1="168" x2="620" y2="66" stroke="#8c959f" stroke-dasharray="4 3"/>
  <line x1="520" y1="70" x2="620" y2="70" stroke="#8c959f"/>
  <text x="570" y="60" text-anchor="middle" font-size="11.5" fill="#57606a">cross-day arbitrage</text>
  <text x="570" y="48" text-anchor="middle" font-size="11.5" fill="#57606a">(R2 target)</text>
</svg>
