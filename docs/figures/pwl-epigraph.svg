<svg viewBox="0 0 560 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="4" y="4" width="552" height="352" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="280" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2328">Convex PWL cost = upper envelope of its segment lines</text>

  <!-- Epigraph shading (region on/above the curve) -->
  <polygon points="64,300 260,266 500,88 500,58 64,58" fill="#0969da" fill-opacity="0.09"/>
  <text x="120" y="92" font-size="11" fill="#0969da">epigraph:  D ≥ g(τ)</text>

  <!-- Breakpoint drop-line (anchors the kink to the axis) -->
  <line x1="260" y1="266" x2="260" y2="300" stroke="#8c959f" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.7"/>

  <!-- Axes -->
  <line x1="64" y1="300" x2="516" y2="300" stroke="#57606a" stroke-width="1.5"/>
  <line x1="64" y1="300" x2="64" y2="52" stroke="#57606a" stroke-width="1.5"/>
  <text x="290" y="342" text-anchor="middle" font-size="12" fill="#1f2328">throughput  τₜ</text>
  <text x="26" y="179" text-anchor="middle" font-size="12" fill="#1f2328" transform="rotate(-90 26 179)">degradation cost</text>

  <!-- Extended segment lines (dashed, lie below the curve away from their segment) -->
  <line x1="64" y1="300" x2="500" y2="224" stroke="#8c959f" stroke-width="1.2" stroke-dasharray="5 4"/>
  <line x1="214" y1="300" x2="500" y2="88" stroke="#8c959f" stroke-width="1.2" stroke-dasharray="5 4"/>

  <!-- ℓ₁ label on its distinct dashed tail (right, below the envelope) -->
  <text x="504" y="226" font-size="11" fill="#8c959f">ℓ₁</text>
  <!-- ℓ₂ label on its distinct dashed tail (left nub, below the envelope) with short leader -->
  <line x1="210" y1="293" x2="240" y2="284" stroke="#8c959f" stroke-width="0.9"/>
  <text x="204" y="296" text-anchor="end" font-size="11" fill="#8c959f">ℓ₂</text>

  <!-- The PWL curve g = max of the lines (solid, bold) -->
  <polyline points="64,300 260,266 500,88" fill="none" stroke="#1a7f37" stroke-width="2.6"/>
  <text x="322" y="140" font-size="13" font-weight="600" fill="#1a7f37">g(τ) = maxₖ ℓₖ</text>

  <!-- Breakpoints -->
  <circle cx="64" cy="300" r="4" fill="#1a7f37"/>
  <circle cx="260" cy="266" r="4" fill="#1a7f37"/>
  <circle cx="500" cy="88" r="4" fill="#1a7f37"/>

  <!-- Breakpoint ticks / labels -->
  <line x1="260" y1="296" x2="260" y2="304" stroke="#57606a"/>
  <line x1="500" y1="296" x2="500" y2="304" stroke="#57606a"/>
  <text x="64" y="318" text-anchor="middle" font-size="11" fill="#57606a">x₀=0</text>
  <text x="260" y="318" text-anchor="middle" font-size="11" fill="#57606a">x₁</text>
  <text x="500" y="318" text-anchor="middle" font-size="11" fill="#57606a">x₂ = τₘₐₓ</text>
</svg>
